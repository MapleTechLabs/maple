name: MCP Evals

# LLM tool-selection + full-execution evals for the MCP server. Nondeterministic
# (drives a real model via OpenRouter), so this is a SEPARATE, non-gating workflow
# rather than part of the main CI job. Without OPENROUTER_API_KEY the eval suite
# skips (green), so the job is safe even before the secret is configured.

on:
    workflow_dispatch:
    pull_request:
        branches: [main]
        paths:
            - "apps/api/src/mcp/**"
            - ".github/workflows/eval.yml"

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    eval:
        name: MCP Evals
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

            - run: bun install --frozen-lockfile

            - name: Run MCP evals
              run: bun run --filter @maple/api eval
              env:
                  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
                  # Override to eval a different model (defaults to the prod kimi-k2.5).
                  MCP_EVAL_MODEL: ${{ vars.MCP_EVAL_MODEL }}
